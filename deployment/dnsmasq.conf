# ──────────────────────────────────────────────────────────────────────────────
# dnsmasq configuration — Captive Portal DNS Hijacking
# Redirects ALL DNS queries from hotspot clients to the portal server IP.
# IMPORTANT: The server itself must NOT use dnsmasq for DNS resolution.
#            /etc/resolv.conf must point to 8.8.8.8 (not 127.0.0.1).
# ──────────────────────────────────────────────────────────────────────────────

# Use upstream DNS servers for any queries dnsmasq needs to forward
# (These are used for non-redirected queries if address= rules don't match)
no-resolv
server=8.8.8.8
server=1.1.1.1

# Listen on all interfaces except loopback
# Hotspot clients connect via the LAN interface; the server's own DNS
# should go directly to 8.8.8.8 via /etc/resolv.conf, NOT through dnsmasq.
interface=*
except-interface=lo

# Bind only to interfaces we're listening on (prevents binding to 0.0.0.0)
bind-dynamic

# ─── DNS Hijacking: Redirect ALL queries to portal ──────────────────────────
# This is the core captive portal mechanism.
# Every DNS query from hotspot clients resolves to the server IP,
# ensuring all HTTP traffic hits our Nginx captive portal.
address=/#/{{SERVER_IP}}

# ─── Captive Portal Detection URL Overrides ──────────────────────────────────
# These ensure OS-level captive portal detection hits our server.
# (Redundant with address=/#/ above, but kept for clarity and safety.)

# Apple
address=/captive.apple.com/{{SERVER_IP}}
address=/www.apple.com/{{SERVER_IP}}

# Android / Google
address=/connectivitycheck.android.com/{{SERVER_IP}}
address=/connectivitycheck.gstatic.com/{{SERVER_IP}}
address=/clients3.google.com/{{SERVER_IP}}
address=/clients.l.google.com/{{SERVER_IP}}
address=/www.google.com/{{SERVER_IP}}
address=/google.com/{{SERVER_IP}}

# Microsoft / Windows
address=/www.msftconnecttest.com/{{SERVER_IP}}
address=/msftconnecttest.com/{{SERVER_IP}}
address=/www.msftncsi.com/{{SERVER_IP}}
address=/ipv6.msftconnecttest.com/{{SERVER_IP}}

# Firefox
address=/detectportal.firefox.com/{{SERVER_IP}}

# Samsung
address=/connectivitycheck.platform.hicloud.com/{{SERVER_IP}}
address=/www.qualcomm.cn/{{SERVER_IP}}

# ─── DHCP (optional — if dnsmasq acts as DHCP) ──────────────────────────────
# Uncomment if you want dnsmasq to handle DHCP instead of the router.
# interface=eth0
# dhcp-range=192.168.1.100,192.168.1.200,255.255.255.0,24h
# dhcp-option=option:router,192.168.1.1
# dhcp-option=option:dns-server,{{SERVER_IP}}

# ─── Logging ─────────────────────────────────────────────────────────────────
log-facility=/var/log/dnsmasq.log
log-queries
log-async=50

# ─── Performance ─────────────────────────────────────────────────────────────
cache-size=1000
neg-ttl=60
local-ttl=60

# ─── Security ────────────────────────────────────────────────────────────────
# Don't forward short/typo domains
domain-needed
bogus-priv

# Prevent DNS amplification
dns-forward-max=150
