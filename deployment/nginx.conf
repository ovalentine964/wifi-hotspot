# ──────────────────────────────────────────────────────────────────────────────
# Nginx configuration — WiFi Hotspot Portal
# Captive portal detection redirects + reverse proxy to Flask/Gunicorn
# ──────────────────────────────────────────────────────────────────────────────

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=portal:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

# Upstream
upstream hotspot_api {
    server 127.0.0.1:8000;
    keepalive 8;
}

# ─── HTTP server (captive portal detection MUST be HTTP) ─────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Captive portal detection — respond to ALL detection URLs on HTTP
    # These must return 200/302 for the OS to recognize the captive portal

    # Apple CNA (Captive Network Assistant)
    # Return 302 redirect so iOS shows the portal — NOT 200 "Success"
    location = /hotspot-detect.html {
        return 302 http://$host/;
    }
    location = /library/test/success.html {
        return 302 http://$host/;
    }

    # Android / ChromeOS
    location = /generate_204 {
        return 302 http://$host/;
    }
    location = /gen_204 {
        return 302 http://$host/;
    }
    location = /connectivitycheck/gstatic/ {
        return 302 http://$host/;
    }

    # Windows NCSI
    location = /ncsi.txt {
        return 302 http://$host/;
    }
    location = /connecttest.txt {
        return 302 http://$host/;
    }
    location = /redirect {
        return 302 http://$host/;
    }

    # Firefox
    location = /success.txt {
        default_type text/plain;
        return 200 'success';
    }

    # Samsung
    location = /success_check.html {
        default_type text/html;
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
    }

    # Huawei
    location = /wifi/library/test/success.html {
        default_type text/html;
        return 200 '<HTML><HEAD><TITLE>Success</TITLE></HEAD><BODY>Success</BODY></HTML>';
    }

    # Portal & API — proxy to Flask
    location / {
        limit_req zone=portal burst=20 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 5s;
    }

    # API endpoints — stricter rate limit
    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Auth endpoints — very strict
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location = /health {
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
    }

    # Block dotfiles
    location ~ /\. {
        deny all;
        return 404;
    }
}

# ─── HTTPS server (for admin dashboard + API after auth) ────────────────────
server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name _;

    # SSL — updated by certbot or use self-signed
    ssl_certificate     /etc/ssl/certs/wifi-hotspot.crt;
    ssl_certificate_key /etc/ssl/private/wifi-hotspot.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Proxy all to Flask
    location / {
        limit_req zone=portal burst=20 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }

    location /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location = /health {
        proxy_pass http://hotspot_api;
        proxy_set_header Host $host;
    }

    location ~ /\. {
        deny all;
        return 404;
    }
}
